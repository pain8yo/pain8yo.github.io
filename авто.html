<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>С ДНЕМ РОЖДЕНИЯ</title>
    <style>
        body {
            text-align: center;
            background-color: black;
            color: white;
            font-family: Arial;
            margin-top: 50px;
        }
        img {
            max-width: 90%;
            border-radius: 20px;
            box-shadow: 0 0 20px white;
        }
    </style>
</head>
<body>

    <img src="67.jpg" alt="С днём рождения!">

    <audio id="myAudio" loop autoplay>
        <source src="67.mp3" type="audio/mpeg">
    </audio>

    <script>
        var audio = document.getElementById("myAudio");
        audio.volume = 1.0;
        // Если браузер заблокирует autoplay, показываем кнопку
        audio.play().catch(function(error) {
            var btn = document.createElement("button");
            btn.innerHTML = "🎵 Нажми, чтобы включить музыку";
            btn.style.marginTop = "30px";
            btn.style.padding = "10px 20px";
            btn.style.fontSize = "18px";
            btn.style.background = "#ff9900";
            btn.style.border = "none";
            btn.style.borderRadius = "30px";
            btn.onclick = function() {
                audio.play();
                btn.style.display = "none";
            };
            document.body.appendChild(btn);
        });
    </script>

</body>
</html>
